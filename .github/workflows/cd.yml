name: Deploy to ECS Express mode

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production

    # OIDC authentication requires write permission for id-token
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Authenticate with AWS using OIDC
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-ecs-role
          role-session-name: GitHubActionsECSDeployment

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push backend image to Amazon ECR
        id: build-backend-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: ${{ env.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY_BACKEND }}:${{ github.sha }}

      - name: Build, tag, and push websocket image to Amazon ECR
        id: build-websocket-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.websocket
          push: true
          tags: ${{ env.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY_WS }}:${{ github.sha }}

      - name: Deploy backend to ECS Express Mode
        uses: aws-actions/amazon-ecs-deploy-express-service@v1
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        with:
          # Required inputs
          service-name: ${{ secrets.ECS_SERVICE_BACKEND }}
          image: ${{ env.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY_BACKEND }}:${{ github.sha }}
          execution-role-arn: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/ecsTaskExecutionRole
          infrastructure-role-arn: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/ecsInfrastructureRoleForExpressServices

          # Container configuration
          container-port: 80
          
          # Environment variables
          environment-variables: |
            [
              { "name": "NODE_ENV", "value": "production" },
              { "name": "DATABASE_URL", "value": "${{ secrets.DATABASE_URL }}" },
              { "name": "JWT_SECRET", "value": "${{ secrets.JWT_SECRET }}" },
              { "name": "HTTP_BACKEND_URL", "value": "${{ secrets.HTTP_BACKEND_URL }}" }
            ]

          # Resource configuration
          task-role-arn: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/ecsTaskExecutionRole
          cluster: ${{ secrets.ECS_CLUSTER }}

      - name: Deploy websocket to ECS Express Mode
        uses: aws-actions/amazon-ecs-deploy-express-service@v1
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        with:
          # Required inputs
          service-name: ${{ secrets.ECS_SERVICE_WEBSOCKET }}
          image: ${{ env.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY_WS }}:${{ github.sha }}
          execution-role-arn: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/ecsTaskExecutionRole
          infrastructure-role-arn: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/ecsInfrastructureRoleForExpressServices

          # Container configuration
          container-port: 80

          # Environment variables
          environment-variables: |
            [
              { "name": "NODE_ENV", "value": "production" },
              { "name": "DATABASE_URL", "value": "${{ secrets.DATABASE_URL }}" },
              { "name": "JWT_SECRET", "value": "${{ secrets.JWT_SECRET }}" },
              { "name": "HTTP_BACKEND_URL", "value": "${{ secrets.HTTP_BACKEND_URL }}" }
            ]

          # Resource configuration
          task-role-arn: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/ecsTaskExecutionRole
          cluster: ${{ secrets.ECS_CLUSTER }}