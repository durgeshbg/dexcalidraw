name: Deploy to ECS Express mode

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production

    # OIDC authentication requires write permission for id-token
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Authenticate with AWS using OIDC
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-ecs-role
          role-session-name: GitHubActionsECSDeployment

      - name: Build, tag, and push backend image to Amazon ECR
        id: build-backend-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: latest
        # nosemgrep: third-party-action-not-pinned-to-commit-sha
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          push: true
          # Tag with commit SHA for version tracking
          tags: ${{ env.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY_BACKEND }}:${{ env.IMAGE_TAG }}

      - name: Build, tag, and push websocket image to Amazon ECR
        id: build-websocket-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: latest
        # nosemgrep: third-party-action-not-pinned-to-commit-sha
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.websocket
          push: true
          # Tag with commit SHA for version tracking
          tags: ${{ env.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY_WEBSOCKET }}:${{ env.IMAGE_TAG }}

      - name: Deploy backend to ECS Express Mode
        uses: aws-actions/amazon-ecs-deploy-express-service@v1
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: latest
          NODE_ENV: production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          HTTP_BACKEND_URL: ${{ secrets.HTTP_BACKEND_URL }}
        with:
          # Required inputs
          service-name: ${{ secrets.ECS_SERVICE_BACKEND }}
          image: ${{ env.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY_BACKEND }}:${{ env.IMAGE_TAG }}
          execution-role-arn: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/ecsTaskExecutionRole
          infrastructure-role-arn: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/ecsInfrastructureRoleForExpressServices

          # Container configuration
          container-port: 3001

          # Resource configuration
          task-role-arn: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/ecsTaskExecutionRole
          cluster: ${{ secrets.ECS_CLUSTER }}

      - name: Deploy websocket to ECS Express Mode
        uses: aws-actions/amazon-ecs-deploy-express-service@v1
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: latest
          NODE_ENV: production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          HTTP_BACKEND_URL: ${{ secrets.HTTP_BACKEND_URL }}
        with:
          # Required inputs
          service-name: ${{ secrets.ECS_SERVICE_WEBSOCKET }}
          image: ${{ env.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY_WEBSOCKET }}:${{ env.IMAGE_TAG }}
          execution-role-arn: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/ecsTaskExecutionRole
          infrastructure-role-arn: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/ecsInfrastructureRoleForExpressServices

          # Container configuration
          container-port: 8080

          # Resource configuration
          task-role-arn: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/ecsTaskExecutionRole
          cluster: ${{ secrets.ECS_CLUSTER }}

